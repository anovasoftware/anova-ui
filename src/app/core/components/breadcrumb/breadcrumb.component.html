<div class="breadcrumb-bar" *ngIf="navigationMode">
  <nav class="printable-area" aria-label="Breadcrumb">
    <ng-container *ngIf="menuService.breadcrumbMenus$ | async as breadcrumbMenus">
      <ng-container *ngFor="let menu of breadcrumbMenus; let last = last">
        <a
          *ngIf="isClickable(menu, last)"
          class="breadcrumb-link"
          href=""
          (click)="breadcrumbClick($event, menu.menuId)">
          {{ menu.breadcrumbName || menu.title }}
        </a>

        <span *ngIf="!isClickable(menu, last)" class="breadcrumb-current-no-highlight">
          {{ menu.breadcrumbName || menu.title }}
        </span>

        <span class="breadcrumb-separator" *ngIf="!last">>></span>
      </ng-container>
    </ng-container>

    <span class="breadcrumb-separator" *ngIf="recordBreadcrumb">>></span>

    <span *ngIf="recordBreadcrumb" class="breadcrumb-current">
      {{ recordBreadcrumb }}
    </span>
  </nav>
</div>
