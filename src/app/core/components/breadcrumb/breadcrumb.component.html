<div class="breadcrumb-bar" *ngIf="navigationMode">
  <nav class="printable-area" aria-label="Breadcrumb">

    <ng-container *ngFor="let item of breadcrumbItems; let last = last; let i = index">
      <a
        *ngIf="isClickable(item); else current"
        class="breadcrumb-link"
        href=""
        (click)="breadcrumbClick($event, item, i)">
        {{ item.label }}
      </a>

      <ng-template #current>
        <span class="breadcrumb-current">
          {{ item.label }}
        </span>
      </ng-template>

      <span class="breadcrumb-separator" *ngIf="!last">>></span>

    </ng-container>
  </nav>
</div>
