<div class="printable-area">
  <section *ngIf="grid$ | async as grid">
    <h3
      [matTooltip]="gridId"
      class="grid-title">
      {{ grid.title }}
    </h3>

    <div class="table-wrapper">
      <table mat-table [dataSource]="grid.rows" class="full-width-table grid-table">

        <ng-container *ngFor="let column of grid.columns" [matColumnDef]="column.field">
          <th mat-header-cell *matHeaderCellDef>
            {{ column.label }}
          </th>

          <td mat-cell *matCellDef="let row">
            {{ formatCellValue(getCellValue(row, column.dataPath || column.field), column.format) }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="grid.displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: grid.displayedColumns;"></tr>
      </table>
    </div>
  </section>
</div>
