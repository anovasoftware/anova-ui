<div *ngIf="componentLoaded">

  <!--  <img src="/assets/images/watermark.svg" class="background-watermark" alt="Seagull">-->
  <mat-card [ngClass]="matCardClass">
    <mat-card-header *ngIf="!inline">
      <mat-card-title>
        <div class="warning" *ngIf="form?.readonly">Record is static and cannot be updated.</div>
        <div class="header-with-icon">
          <mat-icon>account_circle</mat-icon>
          <span>{{ header }}</span>
        </div>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="message" class="form-message mat-elevation-z2">
        {{ message }}
      </div>

      <div *ngIf="error" class="form-error-message mat-elevation-z2">
        {{ error }}
      </div>

      <form [formGroup]="formGroup" (ngSubmit)="submitForm()" *ngIf="form" class="material-form">
        <div *ngFor="let control of form.formFields" class="form-row">
          <ng-container [ngSwitch]="control.typeId">
            <app-widget-textbox
              *ngSwitchCase="TypeConstants.CONTROL_TEXTBOX"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-textbox>
            <app-widget-textarea
              *ngSwitchCase="TypeConstants.CONTROL_TEXTAREA"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-textarea>
            <app-widget-select1
              *ngSwitchCase="TypeConstants.CONTROL_SELECT1"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-select1>
            <app-widget-chips
              *ngSwitchCase="TypeConstants.CONTROL_CHIPS"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-chips>
            <app-widget-spinner
              *ngSwitchCase="TypeConstants.CONTROL_SPINNER"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-spinner>
            <app-widget-date1
              *ngSwitchCase="TypeConstants.CONTROL_DATE"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-date1>
            <app-widget-checkbox
              *ngSwitchCase="TypeConstants.CONTROL_CHECKBOX"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-checkbox>


            <input *ngSwitchCase="TypeConstants.CONTROL_HIDDEN"
                   type="hidden"
                   [formControlName]="control.name">

            <div *ngSwitchDefault class="unknown-type-warning mat-elevation-z2">
              ⚠️ {{ control.label }}: Type '{{ control.type.typeId }}-{{ control.type.description }}' not defined yet!
            </div>
          </ng-container>
        </div>

        <div class="button-row" *ngIf="!isViewMode">
          <button
            *ngIf="!inline"
            mat-stroked-button
            type="button"
            (click)="onCancel()">
            Cancel
          </button>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="formGroup.invalid || form.readonly">
            {{ form.saveButtonLabel }}
          </button>
        </div>
      </form>

      <!-- inside mat-card-content, after your dynamic fields -->
      <div class="form-extras" *ngIf="form?.formExtras?.length">
        <ng-container *ngFor="let extra of form?.formExtras">
          <a *ngIf="extra?.type?.typeId === TypeConstants.FORM_EXTRA_LINK"
             class="form-extra-link"
             (click)="onFormExtra(extra)">
            {{ extra.label }}
          </a>
        </ng-container>
      </div>

      <form [formGroup]="formGroup" (ngSubmit)="submitForm()" *ngIf="!form" class="material-form">
        <div class="button-row">
          <button
            mat-stroked-button
            type="button"
            (click)="onCancel()">
            Close
          </button>
        </div>
      </form>

      <div class="form-footer">
        <div class="form-id-display">
          ID: {{ recordId }}
        </div>

        <div class="form-id-display">
          Form ID: {{ formId }}
        </div>
      </div>
    </mat-card-content>

  </mat-card>
</div>
