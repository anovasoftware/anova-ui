<div *ngIf="componentLoaded">
<!--  <img src="/assets/images/watermark.svg" class="background-watermark" alt="Seagull">-->
  <mat-card class="form-card mat-typography">
    <mat-card-header>
      <mat-card-title>
        <div class="header-with-icon">
          <mat-icon>account_circle</mat-icon>
          <span>{{ header }}</span>
        </div>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="message" class="form-message mat-elevation-z2">
        {{ message }}
      </div>

      <div *ngIf="error" class="form-error-message mat-elevation-z2">
        {{ error }}
      </div>

      <form [formGroup]="formGroup" (ngSubmit)="submitForm()" *ngIf="form" class="material-form">
        <div *ngFor="let control of form.formFields" class="form-row">
          <ng-container [ngSwitch]="control.typeId">
            <app-widget-textbox
              *ngSwitchCase="TypeConstants.CONTROL_TEXTBOX"
              [field]="control"
              [formGroup]="formGroup">
            </app-widget-textbox>

            <input *ngSwitchCase="TypeConstants.CONTROL_HIDDEN"
                   type="hidden"
                   [formControlName]="control.name">

            <div *ngSwitchDefault class="unknown-type-warning mat-elevation-z2">
              ⚠️ {{ control.label }}: Type '{{ control.type.description }}' not defined yet!
            </div>
          </ng-container>
        </div>

        <div class="button-row">
          <button
            mat-stroked-button
            type="button"
            (click)="onCancel()">
            Cancel
          </button>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="formGroup.invalid">
            {{ form.saveButtonLabel }}
          </button>
        </div>
      </form>

      <!-- inside mat-card-content, after your dynamic fields -->
      <div class="form-extras" *ngIf="form?.formExtras?.length">
        <ng-container *ngFor="let extra of form?.formExtras">
          <a *ngIf="extra?.type?.typeId === TypeConstants.FORM_EXTRA_LINK"
             class="form-extra-link"
             (click)="onFormExtra(extra)">
              {{ extra.label }}
          </a>
        </ng-container>
      </div>

      <form [formGroup]="formGroup" (ngSubmit)="submitForm()" *ngIf="!form" class="material-form">
        <div class="button-row">
          <button
            mat-stroked-button
            type="button"
            (click)="onCancel()">
            Close
          </button>
        </div>
      </form>



      <div class="form-id-display">
        Form ID: {{ formId }}
      </div>
    </mat-card-content>

  </mat-card>
</div>
