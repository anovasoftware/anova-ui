<div class="toolbar-bar" *ngIf="componentLoaded">
  <div class="printable-area-flex">
    <a [routerLink]="'/navigator/001'" class="app-title logo-link" title="version: {{version}}">
      <!--    <span class="app-title" title="version: {{version}}">-->
      <span class="anova">anova</span>
      <span class="sea-wrapper">
        <img src="assets/icons/seagull.svg" alt="Seagull" class="seagull-icon"/>
        <span class="sea">sea</span>
      </span>
      <!--    </span>-->
    </a>

    <span class="flex-spacer"></span>

    <nav class="header-nav" *ngIf="headerMenus.length > 0">
      <ng-container *ngFor="let item of headerMenus">

        <a *ngIf="!menuService.hasChildren(item.menuId)"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="header-link">
          {{ item.description }}
        </a>

        <ng-container *ngIf="menuService.hasChildren(item.menuId)">
          <button mat-button
                  [matMenuTriggerFor]="menu"
                  class="header-link header-button">
            {{ item.description }}
          </button>

          <mat-menu #menu="matMenu">
            <button mat-menu-item
                    *ngFor="let child of menuService.getChildren(item.menuId)"
                    [routerLink]="child.route"
                    [queryParams]="child.route ? null : { menuId: child.menuId }">
              {{ child.description }}
            </button>
          </mat-menu>
        </ng-container>

      </ng-container>
    </nav>
    <div *ngIf="!isLoggedIn && !isDisabledLogin">
      <a class="header-link" type="button" (click)="onLogin($event)">
        LOGIN
      </a>
    </div>


    <!-- Logged-in state -->
    <div class="flex-row align-center" *ngIf="isLoggedIn">
      <div *ngIf="currentHotel$ | async as selectedHotel">
        <a
          class="header-link"
          href=""
          [matMenuTriggerFor]="hotelMenu"
          (click)="$event.preventDefault()">
          {{ selectedHotel.description }}
        </a>
        <span class="toolbar-separator" *ngIf="selectedHotel.currentEvent">|</span>

        <a
          *ngIf="selectedHotel.currentEvent"
          class="header-link"
          href=""
          (click)="$event.preventDefault()">
            {{ selectedHotel.currentEvent.code }}
        </a>
        <mat-menu #hotelMenu="matMenu">
          <button
            mat-menu-item
            *ngFor="let hotel of user?.hotels"
            (click)="onHotelChange(hotel.hotelId)">

            <mat-icon class="check-icon">
              {{ hotel.hotelId === selectedHotel.hotelId ? 'check' : '' }}
            </mat-icon>

            <span class="hotel-name">
              {{ hotel.description }}
            </span>
          </button>
        </mat-menu>
      </div>


      <!--      &lt;!&ndash; Hotel selector &ndash;&gt;-->
      <!--      <div class="toolbar-selector" *ngIf="(user?.hotels ?? []).length > 0">-->
      <!--        <mat-form-field appearance="outline" class="toolbar-field">-->
      <!--          <mat-select-->
      <!--            placeholder="Select Hotel"-->
      <!--            [value]="selectedHotelId"-->
      <!--            (selectionChange)="onHotelChange($event.value)">-->

      <!--            <mat-option-->
      <!--              *ngFor="let hotel of user?.hotels"-->
      <!--              [value]="hotel.hotelId">-->
      <!--              {{ hotel.description }}-->
      <!--            </mat-option>-->
      <!--          </mat-select>-->
      <!--        </mat-form-field>-->
      <!--      </div>-->

      <button mat-icon-button [matMenuTriggerFor]="accountMenu" title="{{user?.name}}">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #accountMenu="matMenu">
        <button mat-menu-item disabled>
          Signed in as {{ user?.username }}
        </button>
        <mat-divider></mat-divider>

        <button mat-menu-item (click)="onProfile()">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </div>
</div>
