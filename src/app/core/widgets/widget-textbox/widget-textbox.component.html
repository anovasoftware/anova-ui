<div [formGroup]="formGroup">
<!--  <mat-form-field appearance="outline" class="form-field-full">-->
    <mat-form-field
      appearance="outline"
      subscriptSizing="fixed"
      class="form-field-full XXXcompact-field">

    <mat-label>{{field.label}}</mat-label>
    <input
      matInput
      [type]="field.controlType || 'text'"
      [formControlName]="field.name"
      [id]="field.name"
      [placeholder]="field.placeholder || ''"
      [readonly]="field.readonly"
      [class.readonly-field]="field.readonly"
      [tabIndex]="field.readonly ? -1 : 0">

    <!-- Validation errors -->
    <mat-error *ngIf="formGroup.get(field.name)?.invalid && (formGroup.get(field.name)?.touched || formGroup.get(field.name)?.dirty)">
      <ng-container *ngIf="hasError(field.name, 'required')">
        This field is required.
      </ng-container>
      <ng-container *ngIf="hasError(field.name, 'email')">
        Please enter a valid email.
      </ng-container>
    </mat-error>
  </mat-form-field>
</div>
