<div class="chips-widget">
<!--  <label class="chips-label">{{ field.label }}</label>-->
  <h4 class="chips-label">{{ field.label }}</h4>
  <mat-chip-listbox multiple>
    <mat-chip-option
      *ngFor="let option of options"
      [selected]="isSelected(option)"
      [disabled]="option.disabledFlag"
      (click)="toggleOption(option)">
      {{ option.displayValue }}
    </mat-chip-option>
  </mat-chip-listbox>
</div>
