<div class="printable-area gangway-dashboard">
  <div class="guest-type-section" *ngFor="let guestType of guestTypes">

    <div class="guest-type-title">
      {{ guestType.description }}
    </div>

    <div class="status-card-grid">
      <div
        class="count-card"
        [ngClass]="card.cssClass"
        *ngFor="let card of statusCards">

        <div class="count-label">
          {{ getStatusDescription(card.statusId) }}
        </div>

        <div class="count-number">
          {{ getCount(guestType.typeId, card.statusId) }}
        </div>

      </div>
    </div>

  </div>
</div>
